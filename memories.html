<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Love ❤️</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/memories.css">

</head>

<body>

    <!-- Background -->

    <div class="bg-blur bg1"></div>
    <div class="bg-blur bg2"></div>

    <div id="hearts"></div>
    <div id="sparkles"></div>

    <!-- Main -->

    <main class="memory-page">

        <section id="memoryBook">

            <div class="scrapbook">

                <!-- ==========================
                     Heading
                =========================== -->

                <div class="book-title">

                    <span>📖</span>

                    <h1>The Girl Who Stole My Heart ❤️</h1>

                </div>

                <!-- ==========================
                     Photo Frame
                =========================== -->

                <div id="photoFrame"
                     class="photo-frame">

                    <!-- Washi Tape -->

                    <div class="tape tape-left"></div>

                    <div class="tape tape-right"></div>

                    <!-- Stickers -->

                    <img src="assets/dudu/a.gif"
                         class="frame-sticker peek"
                         alt="Peek">

                    <img src="assets/dudu/b.gif"
                         class="frame-sticker hug"
                         alt="Hug">

                    <img src="assets/dudu/c.gif"
                         class="frame-sticker kiss"
                         alt="Kiss">

                    <!-- Photo -->

                    <img id="memoryImage"
                         src=""
                         alt="Memory">

                </div>

                <!-- ==========================
                     Reaction
                =========================== -->

                <div id="reactionBox"
                     class="reaction">

                </div>

                <!-- ==========================
                     Counter
                =========================== -->

                <div class="counter">

                    <span id="currentPage">

                        1

                    </span>

                    /

                    <span id="totalPages">

                        10

                    </span>

                </div>

                <!-- ==========================
                     Navigation
                =========================== -->

                <div class="navigation">

                    <button id="prevBtn">

                        ← Previous

                    </button>

                    <button id="nextBtn">

                        Next →

                    </button>

                </div>

                <!-- ==========================
                     Forever Button
                =========================== -->

                <div class="forever-container">

                    <button id="foreverBtn">

                        ❤️ Our Forever Story →

                    </button>

                </div>

                                <!-- ==========================
                     End Scrapbook
                =========================== -->

            </div>

        </section>

    </main>

    <!-- ==========================
         Floating Petals
    =========================== -->

    <div id="petals"></div>

    <!-- ==========================
         Heart / Spark Burst
    =========================== -->

    <div id="burst"></div>

    <!-- ==========================
         Scripts
    =========================== -->

    <script src="js/memories.js"></script>

</body>

</html>
